version: "3.8"

services:

  mysql:
    image: mysql:8.0

    container_name: jwt-auth-mysql

    restart: always

    command:
      - --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: JwtAuthDb
      MYSQL_USER: khanh
      MYSQL_PASSWORD: khanh

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql


volumes:
  mysql_data: